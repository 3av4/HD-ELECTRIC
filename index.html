<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD ELECTRIC DZ | كل ما تحتاجه من المعدات الكهربائية</title>
<meta name="description" content="HD ELECTRIC DZ — متجر إلكتروني احترافي لبيع المعدات واللوازم الكهربائية في الجزائر. توصيل لكل الولايات، الدفع عند الاستلام.">
<link rel="icon" href="https://files.catbox.moe/2wwdz9.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#0A0A0A;
  --card:#1A1A1A;
  --card2:#222222;
  --accent:#FFC107;
  --accent-hover:#FFD54F;
  --text:#F5F5F5;
  --text2:#A0A0A0;
  --border:rgba(255,255,255,0.08);
  --radius-lg:20px;
  --radius-md:14px;
  --radius-sm:10px;
  --font-d:'Manrope',sans-serif;
  --font-b:'Inter',sans-serif;
  --sidebar-w:264px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%; display:block;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,select,textarea{font-family:inherit; color:var(--text); background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; font-size:14px; outline:none; transition:border-color .2s var(--ease), box-shadow .2s var(--ease); width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,193,7,.12);}
::selection{background:var(--accent); color:#0A0A0A;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#2c2c2c; border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:#3a3a3a;}
h1,h2,h3,h4{font-family:var(--font-d); font-weight:800; letter-spacing:-0.02em; line-height:1.15;}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important; transition-duration:.001ms !important;}}

/* ============ LAYOUT SHELL ============ */
.shell{display:flex; min-height:100vh;}
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; position:fixed; top:0; bottom:0; right:0;
  background:linear-gradient(180deg,#0d0d0d,#0A0A0A 40%);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column; padding:26px 20px; z-index:200;
  transition:transform .35s var(--ease);
}
.sb-brand{display:flex; align-items:center; gap:12px; padding:6px 6px 26px 6px; border-bottom:1px solid var(--border); margin-bottom:22px;}
.sb-brand img{width:42px; height:42px; border-radius:10px; object-fit:cover; box-shadow:0 0 0 1px var(--border);}
.sb-brand .name{font-family:var(--font-d); font-weight:800; font-size:15.5px; line-height:1.2;}
.sb-brand .name span{display:block; font-family:var(--font-b); font-weight:500; font-size:11px; color:var(--accent); letter-spacing:.06em; margin-top:2px;}
.sb-nav{display:flex; flex-direction:column; gap:4px; flex:1;}
.sb-link{display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; color:var(--text2); font-size:14.5px; font-weight:600; transition:background .2s var(--ease), color .2s var(--ease); position:relative;}
.sb-link svg{width:19px; height:19px; flex-shrink:0; opacity:.85;}
.sb-link:hover{background:var(--card); color:var(--text);}
.sb-link.active{background:var(--card); color:var(--accent);}
.sb-link.active svg{opacity:1;}
.sb-link .badge{margin-right:auto; background:var(--accent); color:#0A0A0A; font-size:11px; font-weight:800; padding:1px 7px; border-radius:20px; min-width:18px; text-align:center;}
.sb-foot{padding-top:18px; border-top:1px solid var(--border); margin-top:12px; font-size:12px; color:var(--text2); display:flex; flex-direction:column; gap:6px;}
.sb-foot a{color:var(--text2); transition:color .2s;}
.sb-foot a:hover{color:var(--accent);}

.sb-toggle{
  display:none; position:fixed; top:16px; right:16px; z-index:300; width:44px; height:44px;
  background:var(--card); border:1px solid var(--border); border-radius:12px; align-items:center; justify-content:center;
}
.sb-toggle svg{width:20px; height:20px;}
.sb-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(2px); z-index:150;}

main{margin-right:var(--sidebar-w); flex:1; min-width:0; width:calc(100% - var(--sidebar-w));}
.page{padding:0; animation:pageIn .5s var(--ease);}
@keyframes pageIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.wrap{max-width:1180px; margin:0 auto; padding:0 40px;}
@media (max-width:640px){.wrap{padding:0 18px;}}

/* ============ BUTTONS ============ */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 26px; border-radius:100px; font-weight:700; font-size:14.5px; transition:all .25s var(--ease); white-space:nowrap;}
.btn-primary{background:var(--accent); color:#0A0A0A;}
.btn-primary:hover{background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 10px 30px -8px rgba(255,193,7,.5);}
.btn-outline{background:transparent; color:var(--text); border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-2px);}
.btn-ghost{background:var(--card2); color:var(--text);}
.btn-ghost:hover{background:#2a2a2a;}
.btn-sm{padding:9px 16px; font-size:13px;}
.btn-danger{background:transparent; color:#ff6b6b; border:1.5px solid rgba(255,107,107,.3);}
.btn-danger:hover{background:rgba(255,107,107,.1);}
.btn:disabled{opacity:.4; cursor:not-allowed; pointer-events:none;}
.btn-block{width:100%;}

/* ============ HERO ============ */
.hero{position:relative; padding:90px 0 70px; overflow:hidden; text-align:center;}
.hero-bg{position:absolute; inset:0; z-index:0; pointer-events:none;}
.hero-glow{position:absolute; top:-180px; left:50%; transform:translateX(-50%); width:800px; height:600px; background:radial-gradient(ellipse at center, rgba(255,193,7,.14), transparent 65%); filter:blur(10px);}
.hero-content{position:relative; z-index:2;}
.hero-logo{width:76px; height:76px; border-radius:20px; margin:0 auto 22px; box-shadow:0 0 60px -10px rgba(255,193,7,.35), 0 0 0 1px var(--border); animation:floaty 5s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hero-eyebrow{display:inline-flex; align-items:center; gap:8px; color:var(--accent); font-size:12.5px; font-weight:700; letter-spacing:.08em; margin-bottom:18px; background:rgba(255,193,7,.08); padding:7px 16px; border-radius:100px; border:1px solid rgba(255,193,7,.18);}
.hero h1{font-size:clamp(30px,5.2vw,54px); max-width:820px; margin:0 auto 18px; background:linear-gradient(180deg,#fff,#cfcfcf); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
.hero p{color:var(--text2); font-size:16.5px; max-width:520px; margin:0 auto 34px; line-height:1.7;}
.hero-actions{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
.bolt-line{position:absolute; opacity:.5;}

/* ============ SECTIONS ============ */
.section{padding:64px 0;}
.section-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; gap:16px; flex-wrap:wrap;}
.section-eyebrow{color:var(--accent); font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; display:block;}
.section-head h2{font-size:clamp(22px,3vw,32px);}
.section-head p{color:var(--text2); font-size:14.5px; margin-top:6px;}
.see-all{color:var(--text2); font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; transition:color .2s;}
.see-all:hover{color:var(--accent);}

/* Categories */
.cat-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
.cat-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:22px 16px; text-align:center; transition:all .3s var(--ease); cursor:pointer;}
.cat-card:hover{border-color:rgba(255,193,7,.4); background:var(--card2); transform:translateY(-4px);}
.cat-card svg{width:30px; height:30px; color:var(--accent); margin:0 auto 12px;}
.cat-card .cname{font-weight:700; font-size:13.5px;}

/* Product grid & cards */
.prod-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px;}
.pcard{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; transition:all .35s var(--ease); position:relative; display:flex; flex-direction:column;}
.pcard:hover{transform:translateY(-6px); border-color:rgba(255,193,7,.35); box-shadow:0 20px 40px -20px rgba(0,0,0,.6);}
.pcard-img{aspect-ratio:1/0.9; background:var(--card2); overflow:hidden; position:relative;}
.pcard-img img{width:100%; height:100%; object-fit:cover; transition:transform .5s var(--ease);}
.pcard:hover .pcard-img img{transform:scale(1.08);}
.pcard-tag{position:absolute; top:10px; right:10px; background:var(--accent); color:#0A0A0A; font-size:10.5px; font-weight:800; padding:4px 10px; border-radius:100px; z-index:2;}
.pcard-tag.out{background:#3a3a3a; color:var(--text2);}
.pcard-body{padding:16px; display:flex; flex-direction:column; gap:8px; flex:1;}
.pcard-name{font-weight:700; font-size:14.5px; line-height:1.4; min-height:40px;}
.pcard-price{color:var(--accent); font-weight:800; font-size:16.5px; margin-top:auto;}
.pcard-price small{color:var(--text2); font-weight:500; font-size:11.5px;}
.pcard-btn{margin-top:8px; width:100%; padding:11px; background:var(--card2); border-radius:100px; font-weight:700; font-size:13px; text-align:center; transition:all .25s var(--ease); border:1px solid var(--border);}
.pcard-btn:hover{background:var(--accent); color:#0A0A0A; border-color:var(--accent);}
.pcard-link{display:flex; flex-direction:column; flex:1;}

/* Features */
.feat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:20px;}
.feat-card{background:linear-gradient(160deg,var(--card),#151515); border:1px solid var(--border); border-radius:var(--radius-md); padding:26px 22px;}
.feat-card svg{width:26px; height:26px; color:var(--accent); margin-bottom:16px;}
.feat-card h4{font-size:15.5px; margin-bottom:8px;}
.feat-card p{color:var(--text2); font-size:13.5px; line-height:1.7;}

/* Footer */
.footer{border-top:1px solid var(--border); padding:50px 0 30px; margin-top:40px;}
.footer-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:32px; margin-bottom:36px;}
@media (max-width:700px){.footer-grid{grid-template-columns:1fr;}}
.footer h5{font-size:13px; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; margin-bottom:16px; font-weight:700;}
.footer-brand{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.footer-brand img{width:36px; height:36px; border-radius:9px;}
.footer-brand span{font-family:var(--font-d); font-weight:800; font-size:15px;}
.footer p.desc{color:var(--text2); font-size:13.5px; line-height:1.7; max-width:300px;}
.footer-list{display:flex; flex-direction:column; gap:10px; font-size:13.5px; color:var(--text2);}
.footer-list a:hover{color:var(--accent);}
.branch-item{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; display:flex; gap:12px; align-items:center; margin-bottom:10px;}
.branch-item img{width:44px; height:44px; border-radius:8px; object-fit:cover;}
.branch-item .bn{font-weight:700; font-size:13px;}
.branch-item .bl{font-size:11.5px; color:var(--text2);}
.footer-bottom{border-top:1px solid var(--border); padding-top:22px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:12.5px; color:var(--text2);}

/* Empty state */
.empty{text-align:center; padding:70px 20px; color:var(--text2);}
.empty svg{width:48px; height:48px; color:var(--text2); margin:0 auto 16px; opacity:.5;}
.empty h3{color:var(--text); font-size:17px; margin-bottom:8px;}

/* Page header (inner pages) */
.page-header{padding:36px 0 8px;}
.page-header h1{font-size:clamp(22px,3vw,30px);}
.breadcrumbs{color:var(--text2); font-size:13px; margin-bottom:10px; display:flex; gap:6px; align-items:center;}
.breadcrumbs a:hover{color:var(--accent);}

/* filters bar */
.filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px; align-items:center;}
.chip{padding:9px 16px; border-radius:100px; background:var(--card); border:1px solid var(--border); font-size:13px; font-weight:600; color:var(--text2); transition:all .2s;}
.chip.active, .chip:hover{background:var(--accent); color:#0A0A0A; border-color:var(--accent);}
.search-box{position:relative; flex:1; min-width:200px; max-width:320px;}
.search-box svg{position:absolute; right:14px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text2);}
.search-box input{padding-right:38px;}

/* Product Detail */
.pd-grid{display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:flex-start;}
@media (max-width:800px){.pd-grid{grid-template-columns:1fr; gap:26px;}}
.pd-main-img{aspect-ratio:1/1; background:var(--card); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); margin-bottom:12px;}
.pd-main-img img{width:100%; height:100%; object-fit:cover;}
.pd-thumbs{display:flex; gap:10px; flex-wrap:wrap;}
.pd-thumb{width:64px; height:64px; border-radius:10px; overflow:hidden; border:2px solid var(--border); cursor:pointer; opacity:.6; transition:all .2s;}
.pd-thumb.active, .pd-thumb:hover{opacity:1; border-color:var(--accent);}
.pd-thumb img{width:100%; height:100%; object-fit:cover;}
.pd-badge{display:inline-block; font-size:12px; font-weight:700; padding:5px 12px; border-radius:100px; margin-bottom:14px;}
.pd-badge.in{background:rgba(46,204,113,.12); color:#5fd98a;}
.pd-badge.out{background:rgba(255,107,107,.12); color:#ff8a8a;}
.pd-badge.low{background:rgba(255,193,7,.12); color:var(--accent);}
.pd-price{font-size:30px; font-weight:800; color:var(--accent); margin:14px 0;}
.pd-desc{color:var(--text2); line-height:1.9; font-size:14.5px; margin-bottom:22px;}
.qty-row{display:flex; align-items:center; gap:14px; margin-bottom:22px;}
.qty-box{display:flex; align-items:center; background:var(--card2); border:1px solid var(--border); border-radius:100px; overflow:hidden;}
.qty-box button{width:40px; height:40px; font-size:18px; font-weight:700; color:var(--accent);}
.qty-box span{width:36px; text-align:center; font-weight:700;}
.pd-actions{display:flex; gap:12px; flex-wrap:wrap;}

/* Cart */
.cart-item{display:flex; gap:16px; padding:18px 0; border-bottom:1px solid var(--border); align-items:center;}
.cart-item img{width:76px; height:76px; border-radius:12px; object-fit:cover; background:var(--card2); flex-shrink:0;}
.cart-item .ci-info{flex:1; min-width:0;}
.cart-item .ci-name{font-weight:700; font-size:14.5px; margin-bottom:4px;}
.cart-item .ci-price{color:var(--accent); font-weight:700; font-size:14px;}
.cart-item .ci-remove{color:#ff6b6b; font-size:12.5px; margin-top:6px; font-weight:600;}
.cart-summary{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:24px; position:sticky; top:24px;}
.cart-summary .row{display:flex; justify-content:space-between; font-size:14px; color:var(--text2); margin-bottom:12px;}
.cart-summary .row.total{color:var(--text); font-weight:800; font-size:18px; border-top:1px solid var(--border); padding-top:14px; margin-top:14px;}
.cart-layout{display:grid; grid-template-columns:1.6fr 1fr; gap:32px; align-items:flex-start;}
@media (max-width:800px){.cart-layout{grid-template-columns:1fr;}}

/* Forms */
.form-group{margin-bottom:16px;}
.form-group label{display:block; font-size:13px; font-weight:600; color:var(--text2); margin-bottom:7px;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:600px){.form-row{grid-template-columns:1fr;}}
.pay-option{display:flex; align-items:center; gap:12px; background:var(--card); border:1.5px solid var(--accent); border-radius:12px; padding:16px; margin-top:6px;}
.pay-option svg{width:22px; height:22px; color:var(--accent);}

/* Toast / mini cart */
.toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--card2); border:1px solid var(--border); color:var(--text); padding:14px 22px; border-radius:100px; font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:10px; z-index:500; transition:transform .4s var(--ease); box-shadow:0 20px 40px -10px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast svg{width:17px; height:17px; color:var(--accent);}

/* Admin */
.admin-gate{max-width:380px; margin:80px auto; text-align:center;}
.admin-gate .lock{width:56px; height:56px; margin:0 auto 20px; color:var(--accent);}
.admin-tabs{display:flex; gap:8px; margin-bottom:26px; flex-wrap:wrap;}
.admin-tab{padding:10px 18px; border-radius:100px; background:var(--card); border:1px solid var(--border); font-size:13.5px; font-weight:700; color:var(--text2);}
.admin-tab.active{background:var(--accent); color:#0A0A0A; border-color:var(--accent);}
.admin-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-md); padding:22px;}
.table{width:100%; border-collapse:collapse; font-size:13.5px;}
.table th{text-align:right; color:var(--text2); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; padding:10px 12px; border-bottom:1px solid var(--border);}
.table td{padding:12px; border-bottom:1px solid var(--border); vertical-align:middle;}
.table img{width:40px; height:40px; border-radius:8px; object-fit:cover;}
.status-pill{padding:5px 12px; border-radius:100px; font-size:11.5px; font-weight:700;}
.status-new{background:rgba(255,193,7,.14); color:var(--accent);}
.status-contacted{background:rgba(94,158,255,.14); color:#7fb1ff;}
.status-shipped{background:rgba(168,110,255,.14); color:#c39bff;}
.status-delivered{background:rgba(46,204,113,.14); color:#5fd98a;}
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(3px); z-index:900; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .25s var(--ease);}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:26px; max-width:520px; width:100%; max-height:88vh; overflow-y:auto; animation:modalIn .3s var(--ease);}
@keyframes modalIn{from{opacity:0; transform:scale(.96) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);}}
.modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;}
.modal-head h3{font-size:17px;}
.close-x{width:32px; height:32px; border-radius:100px; background:var(--card2); display:flex; align-items:center; justify-content:center;}
.img-hint{font-size:11.5px; color:var(--text2); margin-top:6px; line-height:1.6;}
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:28px;}
.stat-card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px;}
.stat-card .sv{font-size:24px; font-weight:800; color:var(--accent);}
.stat-card .sl{font-size:12.5px; color:var(--text2); margin-top:4px;}
.admin-actions{display:flex; gap:8px;}
.icon-btn{width:32px; height:32px; border-radius:8px; background:var(--card2); display:flex; align-items:center; justify-content:center; transition:all .2s;}
.icon-btn:hover{background:var(--accent); color:#0A0A0A;}
.icon-btn svg{width:15px; height:15px;}

/* Loading skeleton */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 37%,var(--card) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite; border-radius:var(--radius-md);}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:-100% 0;}}

@media (max-width:900px){
  .sidebar{transform:translateX(100%); box-shadow:-20px 0 60px -20px rgba(0,0,0,.6);}
  .sidebar.open{transform:translateX(0);}
  .sb-toggle{display:flex;}
  .sb-overlay.show{display:block;}
  main{margin-right:0; width:100%;}
  .hero{padding-top:96px;}
}
@media (max-width:640px){

    ORDERS = snap.docs.map(d=>({id:d.id, ...d.data()}));

    render();
  }, err=>{ ordersLoaded = true; });

  onSnapshot(doc(db,'settings','config'), snap=>{
    if(snap.exists()){ SETTINGS = {...SETTINGS, ...snap.data()}; render(); }
  }, err=>{});
}

/* ============ CART LOGIC (global) ============ */
window.__addToCart = function(productId, qty=1, goCheckout=false){
  const p = activeProducts().find(x=>x.id===productId);
  if(!p) return;
  const existing = cart.find(i=>i.id===productId);
  if(existing) existing.qty += qty;
  else cart.push({id:p.id, name:p.name, price:p.price, image:(p.images&&p.images[0])||'', qty});
  saveCart();
  if(goCheckout){ location.hash = '#/checkout'; }
  else showToast('تمت الإضافة إلى السلة ✓');
};

      <div class="stat-card"><div class="sv">${activeProducts().length}</div><div class="sl">عدد المنتجات</div></div>
      <div class="stat-card"><div class="sv">${money(totalRevenue)}</div><div class="sl">إجمالي المبيعات</div></div>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab ${adminTab==='orders'?'active':''}" data-tab="orders">الطلبات</button>
      <button class="admin-tab ${adminTab==='products'?'active':''}" data-tab="products">المنتجات</button>
      <button class="admin-tab ${adminTab==='settings'?'active':''}" data-tab="settings">الإعدادات والفروع</button>
    </div>
    <div id="adminTabContent">${adminTab==='orders'?adminOrdersTab():adminTab==='products'?adminProductsTab():adminSettingsTab()}</div>
  </div>
  `;
}
function adminOrdersTab(){
  if(!ORDERS.length) return emptyState('لا توجد طلبات بعد','ستظهر الطلبات الجديدة هنا');
  return `
  <div class="admin-card" style="overflow-x:auto;">
    <table class="table">
      <thead><tr><th>الزبون</th><th>الهاتف</th><th>الولاية</th><th>المنتجات</th><th>المجموع</th><th>الحالة</th></tr></thead>
      <tbody>
      ${ORDERS.map(o=>`
        <tr>
          <td>${escapeHtml(o.name)}</td>
          <td>${escapeHtml(o.phone)}</td>
          <td>${escapeHtml(o.wilaya||'')}</td>
          <td>${(o.items||[]).map(i=>`${escapeHtml(i.name)}×${i.qty}`).join('، ')}</td>
          <td style="color:var(--accent); font-weight:700;">${money(o.total)}</td>
          <td>
            <select class="order-status" data-id="${o.id}" style="padding:6px 10px; font-size:12.5px;">
              ${['جديد','تم الاتصال','تم الشحن','تم التسليم'].map(s=>`<option ${o.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
function adminProductsTab(){
  return `
  <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
    <button class="btn btn-primary btn-sm" id="addProductBtn">${ICONS.plus} إضافة منتج</button>
  </div>
  <div class="admin-card" style="overflow-x:auto;">
    <table class="table">
      <thead><tr><th>صورة</th><th>الاسم</th><th>الفئة</th><th>السعر</th><th>المخزون</th><th>الحالة</th><th></th></tr></thead>
      <tbody>
      ${activeProducts().map(p=>`
        <tr>
          <td><img src="${(p.images&&p.images[0])||'https://placehold.co/60x60/1A1A1A/A0A0A0?text=HD'}"></td>
          <td>${escapeHtml(p.name)}</td>
          <td>${escapeHtml(p.category||'')}</td>
          <td>${money(p.price)}</td>
          <td>${p.stock??0}</td>
          <td><span class="status-pill ${p.status==='out'?'status-new':'status-delivered'}">${p.status==='out'?'غير متوفر':p.status==='low'?'كمية محدودة':'متوفر'}</span></td>
          <td><div class="admin-actions">
            <button class="icon-btn edit-product" data-id="${p.id}">${ICONS.edit}</button>
            <button class="icon-btn del-product" data-id="${p.id}">${ICONS.trash}</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}
function adminSettingsTab(){
  return `
  <div class="admin-card" style="margin-bottom:20px;">
    <h4 style="margin-bottom:16px;">أسعار التوصيل</h4>
    <div class="form-row">
      <div class="form-group"><label>توصيل للمنزل (دج)</label><input id="setHome" type="number" value="${SETTINGS.deliveryHome??600}"></div>
      <div class="form-group"><label>توصيل لمكتب التوصيل (دج)</label><input id="setOffice" type="number" value="${SETTINGS.deliveryOffice??400}"></div>
    </div>
    <button class="btn btn-primary btn-sm" id="saveDeliveryBtn">حفظ الأسعار</button>
  </div>
  <div class="admin-card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h4>الفروع</h4>
      <button class="btn btn-ghost btn-sm" id="addBranchBtn">${ICONS.plus} إضافة فرع</button>
    </div>
    ${(SETTINGS.branches||[]).length ? (SETTINGS.branches||[]).map((b,i)=>`
      <div class="branch-item">
        <img src="${b.image||'https://placehold.co/80x80/1A1A1A/A0A0A0?text=HD'}">
        <div style="flex:1;"><div class="bn">${escapeHtml(b.name)}</div><div class="bl">${escapeHtml(b.address||'')}</div></div>
        <button class="icon-btn del-branch" data-i="${i}">${ICONS.trash}</button>
      </div>`).join('') : `<p style="color:var(--text2); font-size:13.5px;">لا توجد فروع مضافة بعد</p>`}
  </div>`;
}

function modal(html){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener('click', e=>{ if(e.target===bg) bg.remove(); });
  document.body.appendChild(bg);
  return bg;
}

function productFormModal(existing){
  const p = existing || {name:'',price:'',category:CATEGORIES[0].name,stock:0,status:'in',images:[''],desc:'',bestSeller:false,newArrival:false};
  const m = modal(`
    <div class="modal-head"><h3>${existing?'تعديل المنتج':'إضافة منتج جديد'}</h3><button class="close-x" id="closeModal">✕</button></div>
    <div class="form-group"><label>اسم المنتج</label><input id="pfName" value="${escapeHtml(p.name)}"></div>
    <div class="form-row">
      <div class="form-group"><label>السعر (دج)</label><input id="pfPrice" type="number" value="${p.price}"></div>
      <div class="form-group"><label>المخزون</label><input id="pfStock" type="number" value="${p.stock}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>الفئة</label><select id="pfCategory">${CATEGORIES.map(c=>`<option ${c.name===p.category?'selected':''}>${c.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>الحالة</label><select id="pfStatus">
        <option value="in" ${p.status==='in'?'selected':''}>متوفر</option>
        <option value="low" ${p.status==='low'?'selected':''}>كمية محدودة</option>
        <option value="out" ${p.status==='out'?'selected':''}>غير متوفر</option>
      </select></div>
    </div>
    <div class="form-group"><label>روابط الصور (رابط لكل سطر، من catbox.moe)</label>
      <textarea id="pfImages" rows="3" placeholder="https://files.catbox.moe/xxxx.jpg">${(p.images||[]).join(String.fromCharCode(10))}</textarea>
      <div class="img-hint">لرفع صورة: افتح <strong>catbox.moe</strong> ← اضغط Upload ← اختر الصورة ← انسخ الرابط الناتج والصقه هنا (رابط واحد في كل سطر لعدة صور).</div>
    </div>
    <div class="form-group"><label>الوصف</label><textarea id="pfDesc" rows="3">${escapeHtml(p.desc||'')}</textarea></div>
    <div class="form-row">
      <label style="display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;"><input type="checkbox" id="pfBest" ${p.bestSeller?'checked':''} style="width:auto;"> الأكثر مبيعًا</label>
      <label style="display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;"><input type="checkbox" id="pfNew" ${p.newArrival?'checked':''} style="width:auto;"> وصل حديثًا</label>
    </div>
    <button class="btn btn-primary btn-block" id="pfSave" style="margin-top:10px;">حفظ المنتج</button>
  `);
  m.querySelector('#closeModal').addEventListener('click', ()=>m.remove());
  m.querySelector('#pfSave').addEventListener('click', async ()=>{
    const data = {
      name: m.querySelector('#pfName').value.trim(),
      price: Number(m.querySelector('#pfPrice').value)||0,
      stock: Number(m.querySelector('#pfStock').value)||0,
      category: m.querySelector('#pfCategory').value,
      status: m.querySelector('#pfStatus').value,
      images: m.querySelector('#pfImages').value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean),
      desc: m.querySelector('#pfDesc').value.trim(),
      bestSeller: m.querySelector('#pfBest').checked,
      newArrival: m.querySelector('#pfNew').checked,
    };
    if(!data.name || !data.price){ showToast('يرجى تعبئة الاسم والسعر'); return; }
    try{
      if(existing && existing.id && !existing.id.startsWith('demo')){
        await updateDoc(doc(db,'products',existing.id), data);
      } else {
        data.createdAt = Date.now();
        await addDoc(collection(db,'products'), data);
      }
      showToast('تم الحفظ بنجاح ✓');
      m.remove();
    }catch(e){ console.error(e); showToast('حدث خطأ أثناء الحفظ'); }
  });
}

function branchFormModal(){
  const m = modal(`
    <div class="modal-head"><h3>إضافة فرع</h3><button class="close-x" id="closeModal">✕</button></div>
    <div class="form-group"><label>اسم الفرع</label><input id="bfName" placeholder="مثال: فرع الجزائر الوسطى"></div>
    <div class="form-group"><label>رابط صورة الفرع (من catbox.moe)</label><input id="bfImage" placeholder="https://files.catbox.moe/xxxx.jpg"></div>
    <div class="form-group"><label>العنوان</label><input id="bfAddress" placeholder="العنوان بالتفصيل"></div>
    <div class="form-group"><label>رابط الموقع (Google Maps - اختياري)</label><input id="bfLink" placeholder="https://maps.google.com/..."></div>
    <button class="btn btn-primary btn-block" id="bfSave">حفظ الفرع</button>
  `);
  m.querySelector('#closeModal').addEventListener('click', ()=>m.remove());
  m.querySelector('#bfSave').addEventListener('click', async ()=>{
    const name = m.querySelector('#bfName').value.trim();
    if(!name){ showToast('أدخل اسم الفرع'); return; }
    const branch = {name, image:m.querySelector('#bfImage').value.trim(), address:m.querySelector('#bfAddress').value.trim(), link:m.querySelector('#bfLink').value.trim()};
    const branches = [...(SETTINGS.branches||[]), branch];
    try{
      await setDoc(doc(db,'settings','config'), {...SETTINGS, branches}, {merge:true});
      showToast('تمت إضافة الفرع ✓'); m.remove();
    }catch(e){ console.error(e); showToast('حدث خطأ'); }
  });
}

function wireAdmin(){
  const gateBtn = document.getElementById('adminLoginBtn');
  if(gateBtn){
    const codeInput = document.getElementById('adminCode');
    const tryLogin = ()=>{
      if(codeInput.value === 'man3207'){
        adminAuthed = true; localStorage.setItem('hd_admin_ok','1');
        render();
      } else showToast('رمز الدخول غير صحيح');
    };
    gateBtn.addEventListener('click', tryLogin);
    codeInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
    return;
  }
  const logoutBtn = document.getElementById('adminLogout');
  if(logoutBtn) logoutBtn.addEventListener('click', ()=>{ adminAuthed=false; localStorage.removeItem('hd_admin_ok'); render(); });

  document.querySelectorAll('.admin-tab').forEach(el=>el.addEventListener('click', ()=>{ adminTab = el.dataset.tab; render(); }));

  document.querySelectorAll('.order-status').forEach(el=>el.addEventListener('change', async ()=>{
    try{ await updateDoc(doc(db,'orders',el.dataset.id), {status: el.value}); showToast('تم تحديث حالة الطلب ✓'); }
    catch(e){ showToast('حدث خطأ'); }
  }));

  const addBtn = document.getElementById('addProductBtn');
  if(addBtn) addBtn.addEventListener('click', ()=>productFormModal());
  document.querySelectorAll('.edit-product').forEach(el=>el.addEventListener('click', ()=>{
    const p = activeProducts().find(x=>x.id===el.dataset.id); productFormModal(p);
  }));
  document.querySelectorAll('.del-product').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('هل تريد حذف هذا المنتج؟')) return;
    try{ await deleteDoc(doc(db,'products',el.dataset.id)); showToast('تم الحذف ✓'); }
    catch(e){ showToast('حدث خطأ'); }
  }));

  const saveDelivery = document.getElementById('saveDeliveryBtn');
  if(saveDelivery) saveDelivery.addEventListener('click', async ()=>{
    const deliveryHome = Number(document.getElementById('setHome').value)||0;
    const deliveryOffice = Number(document.getElementById('setOffice').value)||0;
    try{
      await setDoc(doc(db,'settings','config'), {...SETTINGS, deliveryHome, deliveryOffice}, {merge:true});
      showToast('تم حفظ الأسعار ✓');
    }catch(e){ showToast('حدث خطأ'); }
  });
  const addBranchBtn = document.getElementById('addBranchBtn');
  if(addBranchBtn) addBranchBtn.addEventListener('click', ()=>branchFormModal());
  document.querySelectorAll('.del-branch').forEach(el=>el.addEventListener('click', async ()=>{
    const branches = (SETTINGS.branches||[]).filter((b,i)=>i!==Number(el.dataset.i));
    try{ await setDoc(doc(db,'settings','config'), {...SETTINGS, branches}, {merge:true}); showToast('تم الحذف ✓'); }
    catch(e){ showToast('حدث خطأ'); }
  }));
}

/* ============ INIT ============ */
render();
</script>
</body>
</html>
